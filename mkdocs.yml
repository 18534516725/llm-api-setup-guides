site_name: NexoToken 中文 AI 教程
site_description: Claude Code、Codex CLI、Qwen Code、Gemini CLI、Cherry Studio、Dify 与主流 AI 工具的中文自定义 API 配置教程。
site_author: NexoToken
site_url: https://18534516725.github.io/llm-api-setup-guides/
repo_name: 18534516725/llm-api-setup-guides
repo_url: https://github.com/18534516725/llm-api-setup-guides
edit_uri: edit/main/guides/
docs_dir: guides
site_dir: site
copyright: Copyright &copy; 2026 NexoToken · 教程采用 MIT License

theme:
  name: material
  language: zh
  custom_dir: guides/overrides
  icon:
    logo: material/book-open-page-variant
  font: false
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.action.view
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-\.\_]+'

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://cdn.busuanzi.cc/busuanzi/3.6.9/busuanzi.min.js
  - assets/javascripts/extra.js

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/18534516725/llm-api-setup-guides
      name: GitHub 仓库
    - icon: fontawesome/solid/bolt
      link: https://www.nexotoken.net/?ref=github-pages
      name: NexoToken


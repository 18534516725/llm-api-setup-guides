{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ config.site_name }}">
  <meta property="og:title" content="{% if page %}{{ page.title }} · {% endif %}{{ config.site_name }}">
  <meta property="og:description" content="{% if page and page.meta.description %}{{ page.meta.description }}{% else %}{{ config.site_description }}{% endif %}">
  <meta property="og:url" content="{% if page %}{{ page.canonical_url }}{% else %}{{ config.site_url }}{% endif %}">
  <meta property="og:image" content="{{ config.site_url }}assets/images/social-preview.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page %}{{ page.title }} · {% endif %}{{ config.site_name }}">
  <meta name="twitter:description" content="{% if page and page.meta.description %}{{ page.meta.description }}{% else %}{{ config.site_description }}{% endif %}">
  <meta name="twitter:image" content="{{ config.site_url }}assets/images/social-preview.png">
{% endblock %}
